version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tg-content-maker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_content_maker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tg_content_maker"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: tg-content-maker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    image: python:3.12-slim
    container_name: tg-content-maker-api
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    image: python:3.12-slim
    container_name: tg-content-maker-worker
    restart: unless-stopped
    working_dir: /app/backend
    volumes:
      - ./:/app
    env_file:
      - ./backend/.env
    command: bash -lc "pip install -r requirements.txt && python -m app.worker"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
